name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

# Allow the workflow to publish to GitHub Pages.
permissions:
  contents: read
  pages: write
  id-token: write

# Only one deploy at a time; let the newest win.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      # Use `npm install`, not `npm ci`: the package-lock.json was generated on
      # macOS and omits Linux-only optional deps (@emnapi/* — the WASM fallback for
      # Tailwind/lightningcss native binaries), which makes the strict `npm ci`
      # check fail on the Linux runner. `npm install` resolves them for this platform.
      - run: npm install --no-audit --no-fund
      - name: Build static site
        run: npm run build
        env:
          GITHUB_PAGES: "true"
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: ./out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
